schema: 1
tracker:
    kind: github
    endpoint: https://api.github.com/graphql
    api_key: $GITHUB_TOKEN
    github_status_source: label
    repository: digitaldrywood/detent
    status_label_prefix: "detent:"
    observed_states:
        - Backlog
        - Blocked
        - Human Review
    active_states:
        - Todo
        - In Progress
        - Rework
        - Merging
    terminal_states:
        - Done
        - Cancelled
    state_map:
        Cancelled: Done
    dependency_auto_unblock:
        enabled: true
        source_states:
            - Blocked
        target_state: Todo
        readiness: terminal_or_merged
polling:
    # Label-backed status polling uses REST issue/label endpoints. A 2-min
    # cadence keeps the board responsive while leaving GraphQL budget for
    # operations that have no REST equivalent.
    interval_ms: 120000
server:
    host: 0.0.0.0
    port: 4000
    kanban:
        mode: integration
workspace:
    root: ~/code/detent-workspaces
    source_root: ~/projects/digitaldrywood/detent
agent:
    # Merge train: keep global throughput at 5, but serialize the final
    # rebase/push/merge so concurrent merge candidates do not invalidate
    # each other's CI. States omitted from max_concurrent_agents_by_state
    # share the global pool.
    # Restored to 5 (full throughput): the two root causes of the earlier
    # exhaustion are fixed — host TCP/socket churn (sysctl msl=1000 +
    # portrange.first=16384 + #311 process-group reaping) and the 552-pt board
    # poll (#313/#314 gutted it to single-digit points; budget holds at ~5000).
    max_concurrent_agents: 5
    # Spend-progress breaker DISABLED 2026-07-12 (0 = off, spend_progress.go
    # gates on limit <= 0): this host runs on a flat Codex subscription, so
    # every USD figure the breaker computes is notional — it was parking
    # healthy merge-train-tail work over fake dollars (detent#1276) and
    # crippled fleet throughput. Real runaway brakes stay on: no-progress
    # diff-fingerprint parking (#1232), max_session_tokens, and provider
    # capacity pauses (#1158). Re-enable only with an auth-aware design
    # (subscription vs metered — see the subscription-mode issue).
    no_progress_spend_limit_usd: 0
    max_concurrent_agents_by_state:
        Merging: 1
    dispatch_priority_by_state:
        - Merging
        - Rework
        - In Progress
        - Todo
    # hotfix label jumps the queue within a state — used to cut hotfix releases.
    # priority marks backlog items that should dispatch ahead of unlabeled work
    # once promoted to Todo.
    dispatch_priority_by_label:
        - hotfix
        - priority
        - bug
    max_turns: 20
    # Trial: reattach orphaned provider threads on restart (detent#1155/PR #1175)
    # instead of fresh continuations — falls back safely if resume fails.
    resume_orphaned_sessions: true
    experimental_thread_resume: true
    # Kill runaway sessions at 4x the observed median (7.7M tokens); the worst
    # outlier hit 55M while p90 is 23M, so this cap only cuts the pathological
    # tail (doctor runaway_session_tokens finding).
    max_session_tokens: 200000000
    # Escape hatch for legitimately huge sessions (mega-features at xhigh):
    # label an issue allow-large-session to lift the cap for its sessions.
    max_session_token_override_label: allow-large-session
    # This project's review-flow choice: no human review. Completed issues wait
    # in In Progress for the PR gate (CI green), then promote directly to
    # Merging (gate_wait_state: source). Human Review is never entered unless
    # the optout label is applied or the gate wait times out. This project does
    # not require a GitHub bot PR review signal for promotion; CI and no P1
    # findings are the promotion criteria.
    auto_promote:
        enabled: true
        quiet_seconds: 0
        gate_wait_state: source
        optout_label: requires-human-review
        allowed_issue_labels: []
codex:
    # Deliberately unpinned: the Codex CLI default manages the model, so this
    # survives provider model retirements and picks up generation upgrades
    # automatically. Telemetry resolves the effective model from the session
    # since #1103, so pricing attribution works without a pin. Reasoning
    # effort is left at the provider default; not all models accept a
    # model_reasoning_effort override.
    command: codex --config shell_environment_policy.inherit=all app-server
    approval_policy: never
    # Full access: agents run git fetch/worktree against the source repo,
    # need network for `go mod download`, and write to the shared Go build/module
    # cache (~/go, ~/.cache/go-build) which lives outside the worktree.
    thread_sandbox: danger-full-access
    turn_sandbox_policy:
        type: dangerFullAccess
gate:
    kind: command
    run: make check
    require_automated_review: false
budget:
    # Enabled 2026-07-11 as an independent circuit breaker against runaway
    # sessions, orthogonal to the no-progress breaker (which had a real gap,
    # #1224). Notional pricing under subscription auth (Detent's built-in
    # default table, falls back to gpt-5.5 rates for gpt-5.6-sol); still
    # real enough to pace spend and force a cooldown on a burning issue.
    # This project runs the highest volume in the fleet, so the ceilings are
    # higher than gopher-ai's.
    # per_day_max_usd raised 100 -> 250 2026-07-11 PM: the #213/#214 no-PR
    # loop straddled the UTC day boundary, so today's real spend already
    # opened north of $164 before any of it was today's healthy work — the
    # $100 cap was blocking legitimate dispatch on top of yesterday's mess.
    # Revisit back down once #1224/#1229/#1211 land and burn normalizes.
    # per_issue_max_usd raised 8 -> 25 2026-07-11 PM: two separate xhigh-effort
    # structural issues (#1224, #1237) both hit the $8 ceiling doing real,
    # legitimate iterative work with no PR yet to fall back on — the per-issue
    # cap has no automatic reset, so each one stalls permanently at $8 rather
    # than cooling down like the daily cap does. $8 was simply too tight for
    # this project's effort tier, not a fluke either time.
    # per_day_max_usd raised 250 -> 400 2026-07-11 PM: today's real spend
    # reached $278 on genuinely productive work (v0.30.0 shipped, #1224/#1227/
    # #1228/#1229/#1230/#1231 merged, #1233/#1234/#1237/#1239 legitimately
    # in progress, one session each, no loop pattern) — the operator explicitly
    # authorized a heavy, unattended work day. Revisit down tomorrow.
    # DISABLED 2026-07-12 PM (operator decision): this host runs on a flat
    # Codex subscription — every USD in these caps is notional, and a full day
    # of budget refusals (per-issue holds, daily caps consuming FLEET-wide
    # spend per detent#1279) crippled throughput over money that isn't real.
    # Dollar budgets are for metered/API auth; on subscription auth the real
    # constraints are the provider's rolling rate window (capacity pauses,
    # #1158) and outcome-based brakes (no-progress parking #1232,
    # max_session_tokens). Re-enable only behind an auth-aware design.
    enabled: false
    per_day_max_usd: 400
    per_issue_max_usd: 25
    refusal_cooldown_seconds: 3600
hooks:
    after_create: |-
        SOURCE_REPO=$HOME/projects/digitaldrywood/detent
        ISSUE_ID="$(basename "$PWD")"
        BRANCH_NAME="detent/$ISSUE_ID"
        git -C "$SOURCE_REPO" fetch origin main
        git -C "$SOURCE_REPO" worktree prune
        # Prune stale local detent/* branch refs (merged/abandoned issues whose
        # worktree is already gone). git refuses to delete a branch checked out in an
        # active worktree, so in-flight work is protected; the current issue's branch
        # is skipped and (re)created by the worktree add below. GitHub's
        # auto-delete-head-branches only cleans the REMOTE; this keeps the local
        # source clone tidy.
        git -C "$SOURCE_REPO" for-each-ref --format='%(refname:short)' refs/heads/detent/ | while IFS= read -r _b; do
          [ "$_b" = "$BRANCH_NAME" ] && continue
          git -C "$SOURCE_REPO" branch -D "$_b" >/dev/null 2>&1 || true
        done
        # Drop orphaned stash entries left by finished issues. Stashes are
        # repo-global (one refs/stash shared by every worktree) and survive
        # `git worktree remove`, so a stash an agent created and never dropped
        # lingers in the source repo forever. Sweep any stash recorded on a
        # detent/* branch that no longer exists locally; live branches (and
        # therefore in-flight agents' stashes) are untouched, as are stashes on
        # non-detent branches such as main. Iterate from the highest stash index
        # down so drops never shift the indices still to be visited.
        _i="$(git -C "$SOURCE_REPO" stash list 2>/dev/null | wc -l | tr -d ' ')"
        while [ "$_i" -gt 0 ]; do
          _i=$((_i - 1))
          _subj="$(git -C "$SOURCE_REPO" stash list --format='%gs' | sed -n "$((_i + 1))p")"
          _sbranch="${_subj#WIP on }"
          _sbranch="${_sbranch#On }"
          _sbranch="${_sbranch%%:*}"
          case "$_sbranch" in
            (detent/*)
              git -C "$SOURCE_REPO" show-ref --verify --quiet "refs/heads/$_sbranch" ||
                git -C "$SOURCE_REPO" stash drop "stash@{$_i}" >/dev/null 2>&1 || true
              ;;
          esac
        done
        # The Go workspace backend creates the worktree natively (git worktree add)
        # from workspace.source_root before this hook runs, so we no longer add it
        # here. This hook now only keeps origin/main fresh and prunes stale state.
