apiVersion: detent/v1
kind: GlobalConfig
env: dev
log_level: debug
github_token: gh
port: 4000
global:
    max_concurrent_agents: 5
    # strict: projects dispatch in ascending priority order — detent
    # (priority 0) always takes available slots before gopher-ai (priority 3).
    scheduling: strict
    identity:
        name: corys-mac-studio
        ownership_mode: assignee
    fair_share:
        half_life: 1h
    startup:
        jitter_seconds: 0
        max_spawn_per_second: 2
projects:
    - id: detent
      workflow: ~/projects/digitaldrywood/detent-orchestration/WORKFLOW.md
      workdir: ~/code/detent-workspaces
      weight: 1
      # TEMPORARY swap 2026-07-12: gopher-ai gets strict priority until its
      # sole remaining issue (#214, blocked for 2 days by budget machinery)
      # ships and its release is cut, then restore detent=0 / gopher-ai=3.
      priority: 1
    - id: gopher-ai
      workflow: /Users/corylanou/projects/gopherguides/gopher-ai/WORKFLOW.md
      workdir: /Users/corylanou/projects/gopherguides/gopher-ai
      weight: 1
      priority: 0
