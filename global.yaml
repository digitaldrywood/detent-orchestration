apiVersion: detent/v1
kind: GlobalConfig
global:
    max_concurrent_agents: 5
    scheduling: weighted
    fair_share:
        half_life: 1h
    startup:
        jitter_seconds: 10
        max_spawn_per_second: 2
projects:
    - id: detent
      workflow: ~/projects/digitaldrywood/detent-orchestration/WORKFLOW.md
      workdir: ~/code/detent-workspaces
      weight: 1
      priority: 0
